<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C3.ai — M&A Strategy & Valuation Report</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
:root {
  --cmu-red:       #A6192E;
  --cmu-dark:      #78142B;
  --cmu-light:     #F0DCE1;
  --c3-blue:       #0066FF;
  --c3-dark:       #003399;
  --c3-light:      #E6F0FF;
  --c3-cyan:       #00C2FF;
  --c3-teal:       #00B4D8;
  --white:         #ffffff;
  --slate-50:      #F8FAFC;
  --slate-100:     #F1F5F9;
  --slate-200:     #E2E8F0;
  --slate-300:     #CBD5E1;
  --slate-500:     #64748B;
  --slate-700:     #334155;
  --slate-900:     #0F172A;
  --text:          #0F172A;
  --muted:         #64748B;
  --green:         #16A34A;
  --green-light:   #DCFCE7;
  --red:           #DC2626;
  --red-light:     #FEE2E2;
  --amber:         #D97706;
  --amber-light:   #FEF3C7;
  --sans:          'DM Sans', sans-serif;
  --mono:          'JetBrains Mono', monospace;
  --display:       'Playfair Display', serif;
  --shadow:        0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg:     0 16px 48px rgba(0,0,0,0.14);
  --r:             10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--slate-900); font-family: var(--sans); color: var(--text); -webkit-font-smoothing: antialiased; }
#deck { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

.slide { position: absolute; inset: 0; display: flex; flex-direction: column; opacity: 0; pointer-events: none; transition: opacity .5s cubic-bezier(.4,0,.2,1), transform .5s cubic-bezier(.4,0,.2,1); transform: translateX(50px) scale(.98); padding: 52px 68px 48px; overflow: hidden; }
.slide.active { opacity: 1; pointer-events: all; transform: translateX(0) scale(1); }
.slide.exit { opacity: 0; transform: translateX(-50px) scale(.98); transition: opacity .35s ease, transform .35s ease; }

.slide.red { background: linear-gradient(135deg, var(--cmu-red) 0%, var(--cmu-dark) 100%); color: var(--white); }
.slide.red::before { content:''; position:absolute; top:-100px; right:-100px; width:360px; height:360px; border-radius:50%; background:rgba(255,255,255,.04); }

.slide.white { background: var(--white); }
.slide.white::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--cmu-red), var(--c3-blue)); }

.slide.dark { background: var(--slate-900); color: var(--white); }
.slide.dark::before { content:''; position:absolute; inset:0; background: radial-gradient(circle at 70% 30%, rgba(0,102,255,.08) 0%, transparent 60%), radial-gradient(circle at 20% 80%, rgba(166,25,46,.06) 0%, transparent 50%); }

.slide.blue { background: linear-gradient(135deg, var(--c3-dark) 0%, #001A4D 100%); color: var(--white); }
.slide.blue::before { content:''; position:absolute; top:50%; right:-80px; width:300px; height:300px; border-radius:50%; background:rgba(0,194,255,.06); transform:translateY(-50%); }

/* Nav */
#nav { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:14px; background:rgba(15,23,42,.92); border:1px solid rgba(255,255,255,.1); border-radius:100px; padding:8px 20px; backdrop-filter:blur(16px); box-shadow:var(--shadow-lg); z-index:1000; user-select:none; }
#nav button { background:none; border:none; cursor:pointer; width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:rgba(255,255,255,.8); font-size:16px; transition:background .2s; }
#nav button:hover { background:rgba(255,255,255,.1); color:white; }
#nav button:disabled { opacity:.25; cursor:not-allowed; }
#slide-counter { font-size:12px; font-weight:500; color:rgba(255,255,255,.5); min-width:52px; text-align:center; font-family:var(--mono); }
#progress-dots { display:flex; gap:4px; align-items:center; }
.dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.2); cursor:pointer; transition:all .25s; flex-shrink:0; }
.dot.active { background:var(--cmu-red); width:20px; border-radius:3px; }
.dot.section { background:rgba(255,255,255,.35); width:8px; height:8px; }
.dot.section.active { background:var(--c3-blue); width:20px; height:6px; }
#part-tabs { display:flex; gap:4px; }
.ptab { font-size:10px; font-weight:700; padding:5px 12px; border-radius:100px; cursor:pointer; border:none; background:none; color:rgba(255,255,255,.4); transition:all .2s; letter-spacing:.06em; text-transform:uppercase; font-family:var(--mono); }
.ptab:hover { background:rgba(255,255,255,.08); }
.ptab.active { background:var(--cmu-red); color:white; }
#kbd-hint { position:fixed; top:20px; right:24px; font-size:11px; color:rgba(255,255,255,.3); display:flex; gap:6px; align-items:center; font-family:var(--mono); z-index:100; }
kbd { background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.12); border-radius:4px; padding:2px 7px; font-size:10px; color:rgba(255,255,255,.5); }

/* Components */
.s-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:30px; padding-bottom:14px; border-bottom:2px solid var(--slate-200); flex-shrink:0; }
.slide.red .s-header, .slide.blue .s-header { border-color:rgba(255,255,255,.2); }
.slide.dark .s-header { border-color:rgba(255,255,255,.08); }
.s-header h2 { font-size:21px; font-weight:700; letter-spacing:-.02em; }
.s-tag { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:4px 12px; border-radius:100px; font-family:var(--mono); }
.slide.white .s-tag { background:var(--cmu-light); color:var(--cmu-red); }
.slide.red .s-tag, .slide.blue .s-tag { background:rgba(255,255,255,.18); color:white; }
.slide.dark .s-tag { background:rgba(0,102,255,.15); color:var(--c3-cyan); }
.s-body { flex:1; display:flex; flex-direction:column; justify-content:center; min-height:0; }

.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

.card { background:var(--slate-50); border:1.5px solid var(--slate-200); border-radius:var(--r); padding:18px 20px; transition:transform .25s, box-shadow .25s; }
.card:hover { transform:translateY(-2px); box-shadow:var(--shadow); }
.card.cmu { border-left:4px solid var(--cmu-red); border-radius:0 var(--r) var(--r) 0; background:var(--cmu-light); }
.card.c3 { border-left:4px solid var(--c3-blue); border-radius:0 var(--r) var(--r) 0; background:var(--c3-light); }
.card.gn { border-left:4px solid var(--green); border-radius:0 var(--r) var(--r) 0; background:var(--green-light); }
.card.rd { border-left:4px solid var(--red); border-radius:0 var(--r) var(--r) 0; background:var(--red-light); }
.card.am { border-left:4px solid var(--amber); border-radius:0 var(--r) var(--r) 0; background:var(--amber-light); }

.card-label { font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:5px; font-family:var(--mono); }
.card-title { font-size:13.5px; font-weight:700; color:var(--text); margin-bottom:5px; line-height:1.4; }
.card-body { font-size:12px; color:var(--muted); line-height:1.7; }
.card-num { font-size:30px; font-weight:900; line-height:1; margin-bottom:4px; font-family:var(--display); }
.card-num.blue { color:var(--c3-blue); }
.card-num.green { color:var(--green); }
.card-num.red { color:var(--cmu-red); }

.stat-row { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
.stat-box { background:var(--slate-50); border:1.5px solid var(--slate-200); border-radius:var(--r); padding:14px 16px; position:relative; overflow:hidden; }
.stat-box::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--cmu-red), var(--c3-blue)); }
.stat-num { font-size:26px; font-weight:900; color:var(--cmu-red); line-height:1; font-family:var(--display); }
.stat-num.blue { color:var(--c3-blue); }
.stat-num.green { color:var(--green); }
.stat-lbl { font-size:11px; color:var(--muted); margin-top:5px; line-height:1.4; }

.quote { border-left:4px solid var(--cmu-red); padding:12px 18px; background:var(--cmu-light); border-radius:0 8px 8px 0; margin-top:12px; }
.quote.blue { border-color:var(--c3-blue); background:var(--c3-light); }
.quote p { font-size:13px; color:var(--text); line-height:1.7; font-style:italic; }
.quote cite { font-size:11px; color:var(--muted); margin-top:5px; display:block; font-style:normal; font-weight:600; font-family:var(--mono); }
.slide.dark .quote { background:rgba(166,25,46,.1); border-color:var(--cmu-red); }
.slide.dark .quote p { color:white; }
.slide.dark .quote cite { color:var(--slate-300); }

.bar-row { display:flex; align-items:center; gap:10px; margin-bottom:9px; }
.bar-lbl { font-size:12px; color:var(--muted); width:170px; flex-shrink:0; }
.bar-track { flex:1; background:var(--slate-100); border-radius:5px; height:9px; overflow:hidden; }
.bar-fill { height:100%; border-radius:5px; transition:width 1s cubic-bezier(.4,0,.2,1); }
.bar-val { font-family:var(--mono); font-size:11px; color:var(--text); font-weight:700; width:50px; text-align:right; }

.tag { display:inline-block; font-size:10px; font-weight:700; padding:3px 9px; border-radius:100px; margin:2px; font-family:var(--mono); }
.tg { background:var(--green-light); color:var(--green); }
.tr { background:var(--red-light); color:var(--red); }
.tb { background:var(--c3-light); color:var(--c3-dark); }
.ty { background:var(--amber-light); color:var(--amber); }

.data-table { width:100%; border-collapse:collapse; font-size:12px; }
.data-table th { text-align:left; padding:9px 12px; font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:white; background:var(--cmu-red); font-family:var(--mono); }
.data-table th:first-child { border-radius:6px 0 0 0; }
.data-table th:last-child { border-radius:0 6px 0 0; }
.data-table td { padding:9px 12px; border-bottom:1px solid var(--slate-100); vertical-align:top; line-height:1.45; }
.data-table tr:last-child td { border-bottom:none; }
.data-table tr:nth-child(even) td { background:var(--slate-50); }
.data-table tr:hover td { background:var(--cmu-light); }

.find-list { list-style:none; }
.find-list li { display:flex; gap:12px; padding:11px 0; border-bottom:1px solid var(--slate-200); font-size:13px; line-height:1.6; }
.find-list li:last-child { border-bottom:none; }
.li-icon { flex-shrink:0; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; margin-top:2px; }
.li-cmu { background:var(--cmu-light); color:var(--cmu-red); }
.li-c3 { background:var(--c3-light); color:var(--c3-blue); }
.li-gn { background:var(--green-light); color:var(--green); }

.frag { opacity:0; transform:translateY(14px); transition:opacity .45s ease, transform .45s ease; pointer-events:none; }
.frag.shown { opacity:1; transform:translateY(0); pointer-events:all; }
.click-hint { position:absolute; bottom:64px; right:68px; font-size:11px; color:var(--muted); display:flex; align-items:center; gap:5px; opacity:.6; animation:pulse 2.2s ease-in-out infinite; font-family:var(--mono); }
.slide.red .click-hint, .slide.blue .click-hint, .slide.dark .click-hint { color:rgba(255,255,255,.4); }
@keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:.85} }
.info-note { font-size:11px; color:var(--muted); font-family:var(--mono); margin-top:12px; }

/* Title slide */
.title-eyebrow { font-size:12px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:22px; font-family:var(--mono); }
.title-h1 { font-size:56px; font-weight:900; line-height:1.05; letter-spacing:-.03em; color:white; margin-bottom:10px; font-family:var(--display); }
.title-h1 span { color:var(--c3-cyan); }
.title-sub { font-size:16px; font-weight:400; color:rgba(255,255,255,.7); line-height:1.65; max-width:580px; margin-top:16px; }
.title-meta { margin-top:36px; font-size:12px; color:rgba(255,255,255,.4); font-family:var(--mono); }
.title-grid { position:absolute; bottom:48px; right:60px; display:flex; flex-direction:column; gap:5px; text-align:right; }
.title-grid span { font-size:12px; color:rgba(255,255,255,.4); font-family:var(--mono); }
.title-grid span b { color:rgba(255,255,255,.8); }

/* Divider */
.div-part { font-size:11px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.5); margin-bottom:14px; font-family:var(--mono); }
.div-h { font-size:48px; font-weight:900; color:white; letter-spacing:-.03em; line-height:1.1; margin-bottom:18px; font-family:var(--display); }
.div-desc { font-size:15px; color:rgba(255,255,255,.7); line-height:1.7; max-width:600px; }
.div-num { position:absolute; right:60px; top:50%; transform:translateY(-50%); font-size:170px; font-weight:900; color:rgba(255,255,255,.05); letter-spacing:-.05em; line-height:1; pointer-events:none; font-family:var(--display); }

.ticker { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.1); border:1.5px solid rgba(255,255,255,.2); border-radius:6px; padding:3px 12px; font-family:var(--mono); font-size:12px; font-weight:700; color:rgba(255,255,255,.8); }

.chart-wrap { position:relative; width:100%; flex:1; min-height:0; }
.chart-wrap canvas { max-height:100%; }

/* C3.ai logo recreation */
.c3-logo { display:flex; align-items:center; gap:1px; }
.c3-logo .c3-mark { font-family:var(--sans); font-weight:900; font-size:28px; color:white; letter-spacing:-1px; }
.c3-logo .c3-ai { font-family:var(--sans); font-weight:900; font-size:28px; color:var(--c3-cyan); letter-spacing:-1px; }
</style>
</head>
<body>
<div id="kbd-hint"><kbd>←</kbd><kbd>→</kbd> navigate · <kbd>Space</kbd> next</div>
<div id="deck"></div>
<div id="nav">
  <div id="part-tabs">
    <button class="ptab" onclick="goToSection('A')">Overview</button>
    <button class="ptab" onclick="goToSection('B')">Valuation</button>
    <button class="ptab" onclick="goToSection('C')">Bidders</button>
    <button class="ptab" onclick="goToSection('D')">Rec</button>
  </div>
  <div style="width:1px;height:20px;background:rgba(255,255,255,.1)"></div>
  <button id="btn-prev" onclick="navigate(-1)">&#8592;</button>
  <span id="slide-counter">1 / 1</span>
  <button id="btn-next" onclick="navigate(1)">&#8594;</button>
  <div style="width:1px;height:20px;background:rgba(255,255,255,.1)"></div>
  <div id="progress-dots"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const LOGO = `<div style="position:absolute;top:48px;right:60px;display:flex;align-items:center;gap:16px">
  <svg width="120" height="36" viewBox="0 0 120 36" xmlns="http://www.w3.org/2000/svg">
    <text x="0" y="28" font-family="DM Sans,sans-serif" font-weight="900" font-size="30" fill="white" letter-spacing="-1">C3</text>
    <text x="48" y="28" font-family="DM Sans,sans-serif" font-weight="900" font-size="30" fill="#00C2FF" letter-spacing="-1">.ai</text>
  </svg>
  <div style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);border-radius:8px;padding:6px 14px;font-size:10px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.08em;text-transform:uppercase;font-family:var(--mono)">NYSE: AI</div>
</div>`;

const LOGO_WHITE = `<div style="position:absolute;top:48px;right:60px;display:flex;align-items:center;gap:12px">
  <svg width="90" height="28" viewBox="0 0 120 36" xmlns="http://www.w3.org/2000/svg">
    <text x="0" y="28" font-family="DM Sans,sans-serif" font-weight="900" font-size="30" fill="#0F172A" letter-spacing="-1">C3</text>
    <text x="48" y="28" font-family="DM Sans,sans-serif" font-weight="900" font-size="30" fill="#0066FF" letter-spacing="-1">.ai</text>
  </svg>
</div>`;

const SLIDES = [

/* 0 — TITLE */
{ part: 0, type: 'dark', frags: 0, render: () => `
${LOGO}
<div style="flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1">
  <div class="title-eyebrow">M&A Strategy & Valuation Report</div>
  <div class="title-h1">C3.ai <span>Inc.</span></div>
  <div style="margin:10px 0"><span class="ticker">NYSE: AI · $8.68</span></div>
  <div class="title-sub">Intrinsic valuation, comparable analysis, and strategic M&A case for a company with genuine technical differentiation, $622M net cash, and government contracts — trading at distressed multiples.</div>
  <div class="title-meta">Hind Jendara · Carnegie Mellon University in Qatar · April 2026</div>
  <div class="title-grid">
    <span><b>01</b> — Company & Industry</span>
    <span><b>02</b> — Valuation & WACC</span>
    <span><b>03</b> — Bidder Analysis</span>
    <span><b>04</b> — Recommendation</span>
  </div>
</div>
` },

/* 1 — EXEC SUMMARY */
{ part: 0, type: 'white', frags: 0, render: () => `
${LOGO_WHITE}
<div class="s-header"><h2>Executive Summary</h2><span class="s-tag">Thesis</span></div>
<div class="s-body">
  <div class="stat-row">
    <div class="stat-box"><div class="stat-num">$8.68</div><div class="stat-lbl">Current price · Apr 14, 2026</div></div>
    <div class="stat-box"><div class="stat-num blue">$6–$13</div><div class="stat-lbl">Implied value range (comps + M&A)</div></div>
    <div class="stat-box"><div class="stat-num green">$622M</div><div class="stat-lbl">Net cash — hard downside floor at $4.28/sh</div></div>
    <div class="stat-box"><div class="stat-num red">−71%</div><div class="stat-lbl">From 52-week high of $30.24</div></div>
  </div>
  <div class="grid2">
    <div class="card cmu"><div class="card-label">Deal View</div><div class="card-title">Strategic sale at $10–$12/share</div><div class="card-body">Microsoft (preferred) or Palantir at 15–38% premium. $622M cash + $1.5B NOL carryforwards provide tax-efficient acquisition currency. Federal clearances + agentic AI tech offer strategic value beyond standalone DCF.</div></div>
    <div class="card rd"><div class="card-label">Primary Risk</div><div class="card-title">Commercial revenue stagnation</div><div class="card-body">Enterprise AI is commodity infrastructure — every hyperscaler competes. Commercial segment flat for 3 years. Federal alone (45% of rev) cannot support current multiples without commercial acceleration.</div></div>
  </div>
  <div class="quote"><p>A negative DCF does not mean the equity is worthless — it means DCF is the wrong framework for a pre-profit growth company. Value derives from net cash, strategic optionality, and acquisition scenarios.</p><cite>Key Analytical Insight</cite></div>
</div>
` },

/* 2 — PART A DIVIDER */
{ part: 'A', type: 'red', frags: 0, render: () => `
${LOGO}
<div style="flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1">
  <div class="div-part">Section 01</div>
  <div class="div-h">Company &<br>Industry Overview</div>
  <div class="div-desc">What C3.ai sells, how revenue splits federal vs. commercial, historical performance, and why the stock trades at 2.7x forward revenue versus Palantir's 25x+.</div>
  <div class="div-num">01</div>
</div>
` },

/* 3 — BUSINESS MODEL */
{ part: 'A', type: 'white', frags: 0, render: () => `
${LOGO_WHITE}
<div class="s-header"><h2>What C3.ai Actually Sells</h2><span class="s-tag">01 · Business Model</span></div>
<div class="s-body">
  <div class="grid3" style="margin-bottom:14px">
    <div class="card c3"><div class="card-label">Layer 1</div><div class="card-title">C3 Agentic AI Platform</div><div class="card-body">Development & runtime environment. Low-code interface reduces deployment from 18 months to weeks. Not a generic AI tool — pre-configured for industrial use.</div></div>
    <div class="card c3"><div class="card-label">Layer 2</div><div class="card-title">C3 AI Applications</div><div class="card-body">100+ pre-built solutions: predictive maintenance, demand forecasting, fraud detection. SaaS delivery. Value proposition is <b>time-to-production</b>, not algorithmic superiority.</div></div>
    <div class="card c3"><div class="card-label">Layer 3</div><div class="card-title">C3 Generative AI</div><div class="card-body">LLMs + enterprise data for natural language interfaces. Bridges consumer AI UX with industrial data pipelines. Newest product layer driving agentic AI positioning.</div></div>
  </div>
  <div class="grid2">
    <div class="card"><div class="card-label">Revenue Model</div><div class="card-body"><b>90–93%</b> subscription (annual/multi-year)<br><b>7–10%</b> professional services (lower margin)<br><br>Target verticals: <span class="tag tb">Energy</span> <span class="tag tb">Manufacturing</span> <span class="tag tb">Defense</span> <span class="tag tb">Financial Services</span></div></div>
    <div class="card am"><div class="card-label">The Key Distinction</div><div class="card-body">C3.ai is an enterprise AI <b>application</b> company, not a generic platform. Rather than tools for building AI, it delivers pre-configured apps for specific industrial use cases. This distinction matters for valuation — it defines the competitive moat and the acquirer thesis.</div></div>
  </div>
</div>
` },

/* ═══════════════════════════════════════════════ ENGINE ═══════════════════════════════════════════════ */
let current=0, fragIndex=0, chartInstances={};
const deck=document.getElementById('deck'), counter=document.getElementById('slide-counter'), btnPrev=document.getElementById('btn-prev'), btnNext=document.getElementById('btn-next'), dots=document.getElementById('progress-dots'), ptabs=document.querySelectorAll('.ptab');
SLIDES.forEach((s,i)=>{const d=document.createElement('div');d.className='dot'+(typeof s.part==='string'?' section':'');d.title=`Slide ${i+1}`;d.onclick=()=>goTo(i);dots.appendChild(d)});
function buildSlide(i){const s=SLIDES[i],el=document.createElement('div');el.className=`slide ${s.type}`;el.dataset.index=i;el.innerHTML=s.render();el.addEventListener('click',()=>{if(current===i)advanceOrNext()});return el}
const slideEls=SLIDES.map((_,i)=>{const el=buildSlide(i);deck.appendChild(el);return el});
function showSlide(idx,dir){const prev=slideEls[current],next=slideEls[idx];prev.classList.remove('active');prev.classList.add('exit');setTimeout(()=>{prev.classList.remove('exit');prev.style.transform=''},400);next.style.transform=dir>=0?'translateX(50px) scale(.98)':'translateX(-50px) scale(.98)';next.style.opacity='0';requestAnimationFrame(()=>{requestAnimationFrame(()=>{next.classList.add('active');next.style.transform='';next.style.opacity=''})});current=idx;fragIndex=0;updateUI();const s=SLIDES[idx];if(s.chartId&&!chartInstances[s.chartId])setTimeout(()=>initChart(s.chartId),150)}
function advanceOrNext(){const frags=slideEls[current].querySelectorAll('.frag');if(fragIndex<frags.length){frags[fragIndex].classList.add('shown');fragIndex++}else navigate(1)}
function navigate(dir){const t=current+dir;if(t<0||t>=SLIDES.length)return;showSlide(t,dir)}
function goTo(idx){if(idx===current)return;showSlide(idx,idx>current?1:-1)}
function goToSection(part){const idx=SLIDES.findIndex(s=>s.part===part);if(idx!==-1)goTo(idx)}
function updateUI(){counter.textContent=`${current+1} / ${SLIDES.length}`;btnPrev.disabled=current===0;btnNext.disabled=current===SLIDES.length-1;document.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===current));const cp=SLIDES[current].part;const pm={'A':'Overview','B':'Valuation','C':'Bidders','D':'Rec'};ptabs.forEach(t=>{const m=Object.entries(pm).find(([k,v])=>v===t.textContent);t.classList.toggle('active',m&&m[0]===cp)})}
function initChart(id){const canvas=document.getElementById(id);if(!canvas||chartInstances[id])return;if(id==='revChart'){chartInstances[id]=new Chart(canvas,{type:'bar',data:{labels:['FY2026E','FY2027E','FY2028E','FY2029E','FY2030E'],datasets:[{label:'Federal',data:[112,146,182,218,258],backgroundColor:'rgba(22,163,74,0.8)',borderRadius:5,borderSkipped:false},{label:'Commercial',data:[137,137,151,173,204],backgroundColor:'rgba(0,102,255,0.7)',borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{usePointStyle:true,pointStyle:'rectRounded',padding:14,color:'#64748B',font:{size:11,family:'DM Sans'}}},tooltip:{backgroundColor:'#0F172A',titleColor:'#fff',bodyColor:'#CBD5E1',padding:10,cornerRadius:8}},scales:{x:{grid:{display:false},ticks:{color:'#64748B',font:{size:11,family:'DM Sans'}}},y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{color:'#64748B',font:{size:10,family:'JetBrains Mono'},callback:v=>'$'+v+'M'}}},animation:{duration:900,easing:'easeOutQuart'}}})}}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();advanceOrNext()}else if(e.key==='ArrowLeft'){e.preventDefault();navigate(-1)}else if(e.key==='Home')goTo(0);else if(e.key==='End')goTo(SLIDES.length-1)});
let touchStartX=0;document.addEventListener('touchstart',e=>{touchStartX=e.changedTouches[0].screenX},{passive:true});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-touchStartX;if(Math.abs(d)>60){d<0?advanceOrNext():navigate(-1)}},{passive:true});
slideEls[0].classList.add('active');updateUI();
</script>
