<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C3.ai — M&A Strategy & Valuation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  /* C3.ai brand */
  --c3-navy:     #0A1628;
  --c3-dark:     #0D1F3C;
  --c3-blue:     #2563EB;
  --c3-electric: #3B82F6;
  --c3-cyan:     #06B6D4;
  --c3-glow:     rgba(59,130,246,0.15);
  --c3-glow2:    rgba(6,182,212,0.10);
  /* CMU accent */
  --cmu-red:     #BB1A34;
  --cmu-light:   #FBEAED;
  /* Neutrals */
  --white:       #FFFFFF;
  --gray-50:     #F8FAFC;
  --gray-100:    #F1F5F9;
  --gray-200:    #E2E8F0;
  --gray-300:    #CBD5E1;
  --gray-500:    #64748B;
  --gray-700:    #334155;
  --gray-900:    #0F172A;
  --green:       #10B981;
  --green-bg:    #ECFDF5;
  --red:         #EF4444;
  --red-bg:      #FEF2F2;
  --amber:       #F59E0B;
  --amber-bg:    #FFFBEB;
  /* Type */
  --sans: 'Inter', -apple-system, sans-serif;
  --mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  --r: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--c3-navy); font-family: var(--sans); color: var(--gray-900); -webkit-font-smoothing: antialiased; }

#deck { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

/* ═══ SLIDES ═══ */
.slide {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity .45s ease, transform .45s ease;
  transform: translateX(40px);
  padding: 88px 64px 56px; overflow: hidden;
}
.slide.active { opacity: 1; pointer-events: all; transform: translateX(0); }
.slide.exit { opacity: 0; transform: translateX(-40px); transition: opacity .3s, transform .3s; }

/* Themes */
.slide.navy { background: var(--c3-navy); color: var(--white); }
.slide.navy::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at 60% 20%, rgba(37,99,235,.12) 0%, transparent 55%), radial-gradient(ellipse at 20% 80%, rgba(6,182,212,.06) 0%, transparent 50%); pointer-events:none; }

.slide.white { background: var(--white); }
.slide.white::after { content:''; position:absolute; bottom:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--c3-blue), var(--c3-cyan)); }

.slide.dark { background: var(--c3-dark); color: var(--white); }
.slide.dark::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse at 70% 30%, rgba(59,130,246,.1) 0%, transparent 50%); pointer-events:none; }

.slide.accent { background: linear-gradient(135deg, var(--c3-blue) 0%, #1D4ED8 100%); color: var(--white); }
.slide.accent::before { content:''; position:absolute; top:-80px; right:-80px; width:320px; height:320px; border-radius:50%; background:rgba(255,255,255,.05); pointer-events:none; }

/* ═══ NAV — CLEAN, MINIMAL ═══ */
#nav {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 8px;
  background: rgba(10,22,40,.95); border: 1px solid rgba(255,255,255,.08);
  border-radius: 40px; padding: 6px 14px;
  backdrop-filter: blur(20px); z-index: 1000; user-select: none;
}
#nav button {
  background: none; border: none; cursor: pointer;
  width: 30px; height: 30px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.6); font-size: 14px; transition: all .2s;
}
#nav button:hover { background: rgba(255,255,255,.08); color: white; }
#nav button:disabled { opacity: .2; cursor: not-allowed; }
#slide-counter { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.4); min-width: 40px; text-align: center; font-family: var(--mono); letter-spacing: .05em; }

/* Minimal dot progress */
#dots { display: flex; gap: 3px; align-items: center; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.15); cursor: pointer; transition: all .2s; }
.dot.active { background: var(--c3-electric); width: 16px; border-radius: 3px; }

/* ═══ LOGO ═══ */
.logo-c3 { position: absolute; z-index: 10; top: 38px; left: 64px; }

/* ═══ COMPONENTS ═══ */
.s-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; padding-bottom:12px; border-bottom:1.5px solid var(--gray-200); flex-shrink:0; }
.slide.navy .s-hdr, .slide.dark .s-hdr, .slide.accent .s-hdr { border-color:rgba(255,255,255,.1); }
.s-hdr h2 { font-size:20px; font-weight:700; letter-spacing:-.02em; }
.s-badge { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:4px 10px; border-radius:100px; font-family:var(--mono); }
.slide.white .s-badge { background:var(--c3-glow); color:var(--c3-blue); }
.slide.navy .s-badge, .slide.dark .s-badge { background:rgba(59,130,246,.15); color:var(--c3-cyan); }
.slide.accent .s-badge { background:rgba(255,255,255,.2); color:white; }

.s-body { flex:1; display:flex; flex-direction:column; justify-content:center; min-height:0; position:relative; z-index:1; }

.g2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.g3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }

/* Cards */
.cd { background:var(--gray-50); border:1.5px solid var(--gray-200); border-radius:var(--r); padding:16px 18px; transition:transform .2s, box-shadow .2s; }
.cd:hover { transform:translateY(-1px); box-shadow:0 4px 16px rgba(0,0,0,.06); }
.cd.bl { border-left:3px solid var(--c3-blue); border-radius:0 var(--r) var(--r) 0; background:var(--c3-glow); }
.cd.gn { border-left:3px solid var(--green); border-radius:0 var(--r) var(--r) 0; background:var(--green-bg); }
.cd.rd { border-left:3px solid var(--red); border-radius:0 var(--r) var(--r) 0; background:var(--red-bg); }
.cd.am { border-left:3px solid var(--amber); border-radius:0 var(--r) var(--r) 0; background:var(--amber-bg); }
.cd.cm { border-left:3px solid var(--cmu-red); border-radius:0 var(--r) var(--r) 0; background:var(--cmu-light); }

.cd-l { font-size:9px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--gray-500); margin-bottom:4px; font-family:var(--mono); }
.cd-t { font-size:13px; font-weight:700; color:var(--gray-900); margin-bottom:4px; line-height:1.35; }
.cd-b { font-size:11.5px; color:var(--gray-500); line-height:1.65; }
.cd-n { font-size:28px; font-weight:800; line-height:1; margin-bottom:3px; }
.cd-n.blue { color:var(--c3-blue); }
.cd-n.green { color:var(--green); }
.cd-n.red { color:var(--cmu-red); }

/* Stats */
.stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
.st { background:var(--gray-50); border:1.5px solid var(--gray-200); border-radius:var(--r); padding:14px 16px; position:relative; overflow:hidden; }
.st::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg, var(--c3-blue), var(--c3-cyan)); }
.st-n { font-size:24px; font-weight:800; color:var(--c3-blue); line-height:1; }
.st-n.red { color:var(--cmu-red); }
.st-n.green { color:var(--green); }
.st-l { font-size:10px; color:var(--gray-500); margin-top:4px; line-height:1.35; }

/* Quote */
.qt { border-left:3px solid var(--c3-blue); padding:12px 16px; background:var(--c3-glow); border-radius:0 var(--r) var(--r) 0; margin-top:12px; }
.qt p { font-size:12.5px; color:var(--gray-700); line-height:1.65; font-style:italic; }
.qt cite { font-size:10px; color:var(--gray-500); margin-top:4px; display:block; font-style:normal; font-weight:600; font-family:var(--mono); }
.slide.navy .qt, .slide.dark .qt { background:rgba(59,130,246,.08); }
.slide.navy .qt p, .slide.dark .qt p { color:rgba(255,255,255,.85); }
.slide.navy .qt cite, .slide.dark .qt cite { color:rgba(255,255,255,.4); }

/* Bars */
.br { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
.br-l { font-size:11px; color:var(--gray-500); width:140px; flex-shrink:0; }
.br-t { flex:1; background:var(--gray-100); border-radius:4px; height:8px; overflow:hidden; }
.br-f { height:100%; border-radius:4px; transition:width 1s cubic-bezier(.4,0,.2,1); }
.br-v { font-family:var(--mono); font-size:10px; color:var(--gray-700); font-weight:700; width:48px; text-align:right; }

/* Tags */
.tg { display:inline-block; font-size:9px; font-weight:700; padding:2px 8px; border-radius:100px; margin:1px; font-family:var(--mono); }
.tg-g { background:var(--green-bg); color:var(--green); }
.tg-r { background:var(--red-bg); color:var(--red); }
.tg-b { background:var(--c3-glow); color:var(--c3-blue); }
.tg-a { background:var(--amber-bg); color:var(--amber); }

/* Table */
.tb { width:100%; border-collapse:collapse; font-size:11.5px; }
.tb th { text-align:left; padding:8px 12px; font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:white; background:var(--c3-blue); font-family:var(--mono); }
.tb th:first-child { border-radius:6px 0 0 0; }
.tb th:last-child { border-radius:0 6px 0 0; }
.tb td { padding:8px 12px; border-bottom:1px solid var(--gray-100); line-height:1.4; }
.tb tr:last-child td { border-bottom:none; }
.tb tr:nth-child(even) td { background:var(--gray-50); }

/* Fragments */
.frag { opacity:0; transform:translateY(12px); transition:opacity .4s ease, transform .4s ease; pointer-events:none; }
.frag.shown { opacity:1; transform:translateY(0); pointer-events:all; }

.click-h { position:absolute; bottom:60px; right:64px; font-size:10px; color:var(--gray-500); display:flex; align-items:center; gap:4px; opacity:.5; animation:pulse 2s ease-in-out infinite; font-family:var(--mono); }
.slide.navy .click-h, .slide.dark .click-h, .slide.accent .click-h { color:rgba(255,255,255,.3); }
@keyframes pulse { 0%,100%{opacity:.3} 50%{opacity:.7} }

.note { font-size:10px; color:var(--gray-500); font-family:var(--mono); margin-top:10px; }

/* Divider */
.dv-p { font-size:10px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.4); margin-bottom:12px; font-family:var(--mono); }
.dv-h { font-size:46px; font-weight:800; color:white; letter-spacing:-.03em; line-height:1.1; margin-bottom:16px; }
.dv-d { font-size:15px; color:rgba(255,255,255,.6); line-height:1.65; max-width:560px; }
.dv-n { position:absolute; right:56px; top:50%; transform:translateY(-50%); font-size:160px; font-weight:900; color:rgba(255,255,255,.03); letter-spacing:-.05em; line-height:1; pointer-events:none; }

/* Title */
.t-eye { font-size:11px; font-weight:700; letter-spacing:.2em; text-transform:uppercase; color:rgba(255,255,255,.35); margin-bottom:20px; font-family:var(--mono); }
.t-h1 { font-size:52px; font-weight:800; line-height:1.05; letter-spacing:-.03em; color:white; margin-bottom:8px; }
.t-h1 em { font-style:normal; color:var(--c3-cyan); }
.t-sub { font-size:15px; color:rgba(255,255,255,.55); line-height:1.6; max-width:540px; margin-top:14px; }
.t-meta { margin-top:32px; font-size:11px; color:rgba(255,255,255,.3); font-family:var(--mono); }
.t-grid { position:absolute; bottom:44px; right:56px; display:flex; flex-direction:column; gap:4px; text-align:right; }
.t-grid span { font-size:11px; color:rgba(255,255,255,.3); font-family:var(--mono); }
.t-grid b { color:rgba(255,255,255,.65); }

.ticker { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12); border-radius:6px; padding:4px 12px; font-family:var(--mono); font-size:11px; font-weight:700; color:rgba(255,255,255,.6); }

.chart-w { position:relative; width:100%; flex:1; min-height:0; }
.chart-w canvas { max-height:100%; }
</style>
</head>
<body>

<div id="deck"></div>

<div id="nav">
  <button id="btn-prev" onclick="navigate(-1)">&#8592;</button>
  <span id="slide-counter">1 / 20</span>
  <button id="btn-next" onclick="navigate(1)">&#8594;</button>
  <div style="width:1px;height:16px;background:rgba(255,255,255,.08);margin:0 2px"></div>
  <div id="dots"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// C3.ai logo SVG — always top-left on every slide (never collides with section badge top-right)
const L_W = `<svg class="logo-c3" width="88" height="28" viewBox="0 0 100 32" xmlns="http://www.w3.org/2000/svg"><text x="0" y="26" font-family="Inter,sans-serif" font-weight="800" font-size="26" fill="#0F172A" letter-spacing="-0.5">C3</text><text x="42" y="26" font-family="Inter,sans-serif" font-weight="800" font-size="26" fill="#2563EB" letter-spacing="-0.5">.ai</text></svg>`;
const L_D = `<svg class="logo-c3" width="88" height="28" viewBox="0 0 100 32" xmlns="http://www.w3.org/2000/svg"><text x="0" y="26" font-family="Inter,sans-serif" font-weight="800" font-size="26" fill="white" letter-spacing="-0.5">C3</text><text x="42" y="26" font-family="Inter,sans-serif" font-weight="800" font-size="26" fill="#06B6D4" letter-spacing="-0.5">.ai</text></svg>`;

const SLIDES = [

/* 0 — TITLE */
{type:'navy',frags:0,render:()=>`${L_D}
<div style="flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1">
  <div class="t-eye">M&A Strategy & Valuation Report</div>
  <div class="t-h1">C3<em>.ai</em> Inc.</div>
  <div style="margin:8px 0"><span class="ticker">NYSE: AI &nbsp;·&nbsp; $8.68</span></div>
  <div class="t-sub">Genuine technical differentiation, $622M net cash, and established government contracts — trading at distressed valuations. A data-driven case for strategic sale at $10–$12 per share.</div>
  <div class="t-meta">Hind Jendara · Carnegie Mellon University in Qatar · April 2026</div>
  <div class="t-grid">
    <span><b>01</b> Company & Industry</span>
    <span><b>02</b> Valuation & WACC</span>
    <span><b>03</b> Bidder Analysis</span>
    <span><b>04</b> Recommendation</span>
  </div>
</div>`},

/* 1 — EXEC SUMMARY */
{type:'white',frags:0,render:()=>`${L_W}
<div class="s-hdr"><h2>Executive Summary</h2><span class="s-badge">Thesis</span></div>
<div class="s-body">
  <div class="stats">
    <div class="st"><div class="st-n">$8.68</div><div class="st-l">Current Price · Apr 14, 2026</div></div>
    <div class="st"><div class="st-n">$6–$13</div><div class="st-l">Implied Value Range</div></div>
    <div class="st"><div class="st-n green">$622M</div><div class="st-l">Net Cash · $4.28/sh floor</div></div>
    <div class="st"><div class="st-n red">−71%</div><div class="st-l">From 52-wk high $30.24</div></div>
  </div>
  <div class="g2">
    <div class="cd cm"><div class="cd-l">Deal View</div><div class="cd-t">Strategic sale at $10–$12/share</div><div class="cd-b">Microsoft (preferred) or Palantir at 15–38% premium. $622M cash + $1.5B NOL carryforwards provide tax-efficient acquisition currency. Federal clearances + agentic AI offer strategic value beyond standalone DCF.</div></div>
    <div class="cd rd"><div class="cd-l">Primary Risk</div><div class="cd-t">Commercial revenue stagnation</div><div class="cd-b">Enterprise AI is commodity infrastructure — every hyperscaler competes. Commercial segment flat for 3 years. Federal alone (45% rev) cannot support current multiples without commercial acceleration.</div></div>
  </div>
  <div class="qt"><p>A negative DCF does not mean the equity is worthless — it means DCF is the wrong framework for a pre-profit growth company. Value derives from net cash, strategic optionality, and probability-weighted acquisition scenarios.</p><cite>Key Analytical Insight</cite></div>
</div>`},

/* 2 — §01 DIVIDER */
{type:'accent',frags:0,render:()=>`${L_D}
<div style="flex:1;display:flex;flex-direction:column;justify-content:center;position:relative;z-index:1">
  <div class="dv-p">Section 01</div>
  <div class="dv-h">Company &<br>Industry Overview</div>
  <div class="dv-d">What C3.ai sells, how revenue splits federal vs. commercial, historical performance, and why the stock trades at 2.7x forward revenue versus Palantir's 25x+.</div>
  <div class="dv-n">01</div>
</div>`},

/* 3 — BUSINESS MODEL */
{type:'white',frags:0,render:()=>`${L_W}
<div class="s-hdr"><h2>What C3.ai Actually Sells</h2><span class="s-badge">01 · Model</span></div>
<div class="s-body">
  <div class="g3" style="margin-bottom:12px">
    <div class="cd bl"><div class="cd-l">Layer 1</div><div class="cd-t">C3 Agentic AI Platform</div><div class="cd-b">Development & runtime. Low-code reduces deployment from 18 months to weeks. Pre-configured for industrial use — not a generic AI tool.</div></div>
    <div class="cd bl"><div class="cd-l">Layer 2</div><div class="cd-t">C3 AI Applications</div><div class="cd-b">100+ pre-built solutions: predictive maintenance, demand forecasting, fraud detection. SaaS. Value = <b>time-to-production</b>, not algorithmic superiority.</div></div>
    <div class="cd bl"><div class="cd-l">Layer 3</div><div class="cd-t">C3 Generative AI</div><div class="cd-b">LLMs + enterprise data for NL interfaces. Bridges consumer AI UX with industrial data. Newest layer driving agentic positioning.</div></div>
  </div>
  <div class="g2">
    <div class="cd"><div class="cd-l">Revenue</div><div class="cd-b"><b>90–93%</b> subscription (annual/multi-year) · <b>7–10%</b> professional services<br><br>Targets: <span class="tg tg-b">Energy</span> <span class="tg tg-b">Manufacturing</span> <span class="tg tg-b">Defense</span> <span class="tg tg-b">Financial Services</span></div></div>
    <div class="cd am"><div class="cd-l">Key Distinction</div><div class="cd-b">C3.ai is an enterprise AI <b>application</b> company, not a generic platform vendor. Pre-configured apps for specific industrial use cases. This defines the competitive moat and acquirer thesis.</div></div>
  </div>
</div>`},

/* 4 — SEGMENTS */
{type:'white',frags:0,chartId:'revChart',render:()=>`${L_W}
<div class="s-hdr"><h2>Two Segments — Two Diverging Trajectories</h2><span class="s-badge">01 · Revenue</span></div>
<div class="s-body">
  <div class="g2" style="margin-bottom:12px">
    <div class="cd gn"><div class="cd-l">Federal — Growth Engine</div><div class="cd-n green">+30%</div><div class="cd-b">FY2025: $86M → FY2026E: $112M. DoD + intelligence. Security clearances, air-gapped environments. Near-zero churn. 45%+ of total revenue.</div></div>
    <div class="cd rd"><div class="cd-l">Commercial — Stagnation</div><div class="cd-n red">0%</div><div class="cd-b">$137M. Flat 3 years. Customers have Azure AI, SageMaker, Vertex. C3.ai lacks distribution — no CRM, no cloud infra, no existing enterprise relationships.</div></div>
  </div>
  <div class="chart-w" style="height:170px"><canvas id="revChart"></canvas></div>
</div>`},

/* 5 — FINANCIALS */
{type:'white',frags:0,render:()=>`${L_W}
<div class="s-hdr"><h2>Historical Performance — Spending Without Leverage</h2><span class="s-badge">01 · Financials</span></div>
<div class="s-body">
  <table class="tb" style="margin-bottom:12px">
    <thead><tr><th>Metric</th><th>FY21</th><th>FY22</th><th>FY23</th><th>FY24</th><th>FY25</th></tr></thead>
    <tbody>
      <tr><td><b>Revenue ($M)</b></td><td>183</td><td>253</td><td>267</td><td>311</td><td>389</td></tr>
      <tr><td><b>Rev Growth</b></td><td>—</td><td>38%</td><td>5.5%</td><td>16.4%</td><td>25.3%</td></tr>
      <tr><td><b>Gross Margin</b></td><td>75.7%</td><td>74.8%</td><td>67.6%</td><td>57.5%</td><td>60.6%</td></tr>
      <tr><td><b>Op. Margin</b></td><td style="color:var(--red)">(33%)</td><td style="color:var(--red)">(78%)</td><td style="color:var(--red)">(109%)</td><td style="color:var(--red)">(103%)</td><td style="color:var(--red)">(83%)</td></tr>
      <tr><td><b>FCF Margin</b></td><td style="color:var(--red)">(21%)</td><td style="color:var(--red)">(36%)</td><td style="color:var(--red)">(70%)</td><td style="color:var(--red)">(29%)</td><td style="color:var(--red)">(11%)</td></tr>
    </tbody>
  </table>
  <div class="g2">
    <div class="cd am"><div class="cd-l">Cash Burn</div><div class="cd-b">$57.7M burned FY2025. $622M cash = ~10yr runway. <b>Not a liquidity crisis — a strategic relevance crisis</b> if revenue can't scale. SBC consumed 59% of FY25 revenue.</div></div>
    <div class="cd"><div class="cd-l">Peer Discount</div><div class="cd-b"><b>C3.ai: 2.7x</b> NTM vs Palantir <b>25x+</b>, Datadog <b>8x</b>, Snowflake <b>7x</b>. Reflects: negative FCF, revenue volatility, no clear profitability path.</div></div>
  </div>
</div>`},

/* 6 — §02 DIVIDER */
{type:'accent',frags:0,render:()=>`${L_D}

/* ═══ ENGINE ═══ */
let cur=0, fi=0, charts={};
const deck=document.getElementById('deck'), cnt=document.getElementById('slide-counter'), bp=document.getElementById('btn-prev'), bn=document.getElementById('btn-next'), dd=document.getElementById('dots');

SLIDES.forEach((_,i)=>{const d=document.createElement('div');d.className='dot';d.onclick=()=>goTo(i);dd.appendChild(d)});

const els=SLIDES.map((s,i)=>{const el=document.createElement('div');el.className=`slide ${s.type}`;el.innerHTML=s.render();el.addEventListener('click',()=>{if(cur===i)adv()});deck.appendChild(el);return el});

function show(idx,dir){
  const p=els[cur],n=els[idx];
  p.classList.remove('active');p.classList.add('exit');
  setTimeout(()=>{p.classList.remove('exit');p.style.transform=''},350);
  n.style.transform=dir>=0?'translateX(40px)':'translateX(-40px)';n.style.opacity='0';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{n.classList.add('active');n.style.transform='';n.style.opacity=''}));
  cur=idx;fi=0;ui();
  const s=SLIDES[idx];if(s.chartId&&!charts[s.chartId])setTimeout(()=>initC(s.chartId),120);
}
function adv(){const fr=els[cur].querySelectorAll('.frag');if(fi<fr.length){fr[fi].classList.add('shown');fi++}else nav(1)}
function nav(d){const t=cur+d;if(t<0||t>=SLIDES.length)return;show(t,d)}
function goTo(i){if(i===cur)return;show(i,i>cur?1:-1)}
function ui(){
  cnt.textContent=`${cur+1} / ${SLIDES.length}`;
  bp.disabled=cur===0;bn.disabled=cur===SLIDES.length-1;
  dd.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===cur));
}
function initC(id){
  const c=document.getElementById(id);if(!c||charts[id])return;
  if(id==='revChart'){charts[id]=new Chart(c,{type:'bar',data:{labels:['FY26E','FY27E','FY28E','FY29E','FY30E'],datasets:[{label:'Federal',data:[112,146,182,218,258],backgroundColor:'rgba(16,185,129,.75)',borderRadius:4},{label:'Commercial',data:[137,137,151,173,204],backgroundColor:'rgba(37,99,235,.65)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'top',labels:{usePointStyle:true,pointStyle:'rectRounded',padding:12,color:'#64748B',font:{size:10,family:'Inter'}}},tooltip:{backgroundColor:'#0A1628',padding:8,cornerRadius:6}},scales:{x:{grid:{display:false},ticks:{color:'#64748B',font:{size:10}}},y:{grid:{color:'rgba(0,0,0,.03)'},ticks:{color:'#64748B',font:{size:9,family:'SF Mono,monospace'},callback:v=>'$'+v+'M'}}},animation:{duration:800,easing:'easeOutQuart'}}})}
}
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();adv()}else if(e.key==='ArrowLeft'){e.preventDefault();nav(-1)}else if(e.key==='Home')goTo(0);else if(e.key==='End')goTo(SLIDES.length-1)});
let tx=0;document.addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX},{passive:true});document.addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tx;if(Math.abs(d)>50){d<0?adv():nav(-1)}},{passive:true});
els[0].classList.add('active');ui();
</script>
</body>
</html>
