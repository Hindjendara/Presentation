<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIA — Head of Learning Technology</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   EIA BRAND SYSTEM
═══════════════════════════════════════════════ */
:root {
  --green:      #788C5D;
  --green-dark: #0d4314;
  --green-dim:  rgba(61,186,78,0.12);
  --green-mid:  rgba(61,186,78,0.25);
  --white:      #ffffff;
  --off-white:  #f7faf7;
  --gray-100:   #f0f4f0;
  --gray-200:   #dde8dd;
  --gray-400:   #99b099;
  --gray-600:   #5a7060;
  --gray-800:   #2d3d2d;
  --text:       #1a2a1a;
  --muted:      #5a7060;
  --sans:       'Space Grotesk', 'Inter', sans-serif;
  --mono:       'SF Mono', 'Fira Code', monospace;
  --shadow:     0 4px 24px rgba(0,0,0,0.08);
  --shadow-lg:  0 12px 48px rgba(0,0,0,0.12);
}

/* ═══════════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: var(--white); font-family: var(--sans); color: var(--text); }

/* ═══════════════════════════════════════════════
   DECK CONTAINER
═══════════════════════════════════════════════ */
#deck {
  width: 100vw; height: 100vh;
  position: relative; overflow: hidden;
}

/* ═══════════════════════════════════════════════
   SLIDES
═══════════════════════════════════════════════ */
.slide {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.45s ease, transform 0.45s ease;
  transform: translateX(40px);
  padding: 52px 64px 44px;
  overflow: hidden;
}
.slide.active {
  opacity: 1; pointer-events: all;
  transform: translateX(0);
}
.slide.exit {
  opacity: 0;
  transform: translateX(-40px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}

/* ── Green slides (title/dividers) ── */
.slide.green {
  background: var(--green);
  color: var(--white);
}
.slide.green .muted { color: rgba(255,255,255,0.65); }

/* ── White slides (content) ── */
.slide.white {
  background: var(--white);
}

/* ── Dark green slides ── */
.slide.dark {
  background: var(--gray-800);
  color: var(--white);
}
.slide.dark .muted { color: var(--gray-400); }

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
#nav {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 12px;
  background: rgba(255,255,255,0.92); border: 1px solid var(--gray-200);
  border-radius: 100px; padding: 8px 16px;
  backdrop-filter: blur(12px); box-shadow: var(--shadow);
  z-index: 1000; user-select: none;
}
#nav button {
  background: none; border: none; cursor: pointer;
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); font-size: 16px;
  transition: background .15s;
}
#nav button:hover { background: var(--gray-100); }
#nav button:disabled { opacity: 0.3; cursor: not-allowed; }
#slide-counter {
  font-size: 12px; font-weight: 500; color: var(--muted);
  min-width: 52px; text-align: center; font-family: var(--mono);
}
#progress-dots {
  display: flex; gap: 5px; align-items: center;
}
.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gray-200); cursor: pointer;
  transition: all .2s; flex-shrink: 0;
}
.dot.active { background: var(--green); width: 18px; border-radius: 3px; }
.dot.section { background: var(--gray-400); width: 8px; height: 8px; }
.dot.section.active { background: var(--green); width: 18px; height: 6px; }

/* Part tabs in nav */
#part-tabs {
  display: flex; gap: 4px;
}
.ptab {
  font-size: 11px; font-weight: 600; padding: 4px 10px;
  border-radius: 100px; cursor: pointer; border: none;
  background: none; color: var(--muted);
  transition: all .2s; letter-spacing: .03em;
}
.ptab:hover { background: var(--gray-100); }
.ptab.active { background: var(--green); color: white; }

/* Keyboard hint */
#kbd-hint {
  position: fixed; top: 20px; right: 24px;
  font-size: 11px; color: var(--muted);
  display: flex; gap: 6px; align-items: center;
  opacity: 0.6; font-family: var(--mono);
  z-index: 100;
}
kbd {
  background: var(--gray-100); border: 1px solid var(--gray-200);
  border-radius: 4px; padding: 2px 6px; font-size: 10px;
}

/* ═══════════════════════════════════════════════
   SLIDE COMPONENTS
═══════════════════════════════════════════════ */

/* Header */
.s-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px; padding-bottom: 16px;
  border-bottom: 2px solid var(--gray-200);
  flex-shrink: 0;
}
.slide.green .s-header { border-color: rgba(255,255,255,0.25); }
.slide.dark .s-header { border-color: rgba(255,255,255,0.1); }
.s-header h2 { font-size: 22px; font-weight: 600; letter-spacing: -.02em; }
.s-tag {
  font-size: 11px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--green);
  background: var(--green-dim); padding: 4px 10px; border-radius: 100px;
}
.slide.green .s-tag { background: rgba(255,255,255,0.2); color: white; }
.slide.dark .s-tag { background: rgba(61,186,78,0.2); color: var(--green); }

/* Body */
.s-body { flex: 1; display: flex; flex-direction: column; justify-content: center; min-height: 0; }

/* ── Grids ── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

/* ── Cards ── */
.card {
  background: var(--off-white); border: 1.5px solid var(--gray-200);
  border-radius: 12px; padding: 18px 20px;
  transition: transform .2s, box-shadow .2s;
}
.card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.card.g { border-left: 4px solid var(--green); border-radius: 0 12px 12px 0; background: var(--green-dim); border-top: 1.5px solid var(--gray-200); border-right: 1.5px solid var(--gray-200); border-bottom: 1.5px solid var(--gray-200); }
.card.r { border-left: 4px solid #e05252; border-radius: 0 12px 12px 0; background: rgba(224,82,82,0.05); border-top: 1.5px solid #fdd; border-right: 1.5px solid #fdd; border-bottom: 1.5px solid #fdd; }
.card.y { border-left: 4px solid #e8a020; border-radius: 0 12px 12px 0; background: rgba(232,160,32,0.05); border-top: 1.5px solid #fde; border-right: 1.5px solid #fde; border-bottom: 1.5px solid #fde; }
.card.b { border-left: 4px solid #4a7fe8; border-radius: 0 12px 12px 0; background: rgba(74,127,232,0.05); border-top: 1.5px solid #ddf; border-right: 1.5px solid #ddf; border-bottom: 1.5px solid #ddf; }
.card-label { font-size: 10px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
.card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 5px; line-height: 1.4; }
.card-body { font-size: 12.5px; color: var(--muted); line-height: 1.65; }
.card-num { font-size: 30px; font-weight: 700; color: var(--green); line-height: 1; margin-bottom: 4px; }
.card-num.red { color: #e05252; }
.card-num.gray { color: var(--gray-600); }

/* ── Stat row ── */
.stat-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-box { background: var(--off-white); border: 1.5px solid var(--gray-200); border-radius: 10px; padding: 14px 16px; }
.stat-num { font-size: 28px; font-weight: 700; color: var(--green); line-height: 1; }
.stat-num.red { color: #e05252; }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.4; }

/* ── Quote ── */
.quote {
  border-left: 4px solid var(--green); padding: 14px 18px;
  background: var(--green-dim); border-radius: 0 8px 8px 0;
  margin-top: 14px;
}
.quote p { font-size: 13.5px; color: var(--text); line-height: 1.7; font-style: italic; }
.quote cite { font-size: 11px; color: var(--muted); margin-top: 6px; display: block; font-style: normal; font-weight: 500; }
.slide.dark .quote { background: rgba(61,186,78,0.1); border-color: var(--green); }
.slide.dark .quote p { color: var(--white); }
.slide.dark .quote cite { color: var(--gray-400); }

/* ── Bar chart ── */
.bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 9px; }
.bar-lbl { font-size: 12px; color: var(--muted); width: 170px; flex-shrink: 0; }
.bar-track { flex: 1; background: var(--gray-100); border-radius: 4px; height: 8px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 1s cubic-bezier(.4,0,.2,1); }
.bar-val { font-family: var(--mono); font-size: 11px; color: var(--text); font-weight: 600; width: 36px; text-align: right; }

/* ── Tags ── */
.tag { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; margin: 2px; }
.tg { background: var(--green-dim); color: var(--green-dark); }
.tr { background: rgba(224,82,82,0.12); color: #b83232; }
.ty { background: rgba(232,160,32,0.12); color: #9a6010; }
.tb { background: rgba(74,127,232,0.12); color: #2a5ab8; }
.tm { background: var(--gray-100); color: var(--muted); }

/* ── List ── */
.find-list { list-style: none; }
.find-list li {
  display: flex; gap: 12px; padding: 11px 0;
  border-bottom: 1px solid var(--gray-200); font-size: 13.5px;
  line-height: 1.55; color: var(--text);
  transition: background .15s; border-radius: 4px;
}
.find-list li:last-child { border-bottom: none; }
.li-icon {
  flex-shrink: 0; width: 22px; height: 22px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; margin-top: 1px;
}
.li-g { background: var(--green-dim); color: var(--green-dark); }
.li-r { background: rgba(224,82,82,0.12); color: #c03030; }
.li-y { background: rgba(232,160,32,0.12); color: #9a5010; }

/* ── Table ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.data-table th { text-align: left; padding: 9px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); border-bottom: 2px solid var(--gray-200); }
.data-table td { padding: 9px 12px; border-bottom: 1px solid var(--gray-100); vertical-align: top; color: var(--text); line-height: 1.45; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: var(--off-white); }

/* ── Timeline ── */
.timeline { display: flex; gap: 0; margin: 8px 0 24px; }
.tl-item { flex: 1; padding-right: 8px; position: relative; }
.tl-item::after {
  content: ''; position: absolute; top: 10px; left: 20px;
  right: 0; height: 2px; background: var(--gray-200); z-index: 0;
}
.tl-item:last-child::after { display: none; }
.tl-dot {
  width: 20px; height: 20px; border-radius: 50%;
  border: 2px solid var(--gray-200); background: white;
  margin-bottom: 10px; position: relative; z-index: 1;
  transition: all .3s;
}
.tl-dot.g { border-color: var(--green); background: var(--green); }
.tl-dot.r { border-color: #e05252; background: #e05252; }
.tl-day { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 3px; font-family: var(--mono); }
.tl-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.tl-note { font-size: 11px; color: var(--muted); line-height: 1.4; }

/* ── Fragment system (click-reveal) ── */
.frag { opacity: 0; transform: translateY(12px); transition: opacity .4s ease, transform .4s ease; pointer-events: none; }
.frag.shown { opacity: 1; transform: translateY(0); pointer-events: all; }

/* ── SVG graph ── */
.graph-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; }

/* ── Info note ── */
.info-note { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 12px; }

/* ═══════════════════════════════════════════════
   TITLE SLIDE SPECIFIC
═══════════════════════════════════════════════ */
.title-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,0.7); margin-bottom: 20px; }
.title-h1 { font-size: 64px; font-weight: 700; line-height: 1.05; letter-spacing: -.03em; color: white; margin-bottom: 12px; }
.title-h1 span { color: var(--gray-800); }
.title-sub { font-size: 17px; font-weight: 400; color: rgba(255,255,255,0.75); line-height: 1.6; max-width: 580px; margin-top: 16px; }
.title-meta { margin-top: 40px; font-size: 12px; color: rgba(255,255,255,0.5); font-family: var(--mono); }
.eia-badge {
  position: absolute; top: 48px; right: 60px;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  border-radius: 10px; padding: 10px 18px;
  font-size: 11px; font-weight: 700; color: white; letter-spacing: .05em;
  text-transform: uppercase;
}
.title-grid {
  position: absolute; bottom: 48px; right: 60px;
  display: flex; flex-direction: column; gap: 6px; text-align: right;
}
.title-grid span { font-size: 12px; color: rgba(255,255,255,0.55); }
.title-grid span b { color: white; }

/* ═══════════════════════════════════════════════
   DIVIDER SLIDE
═══════════════════════════════════════════════ */
.div-part { font-size: 11px; font-weight: 700; letter-spacing: .18em; text-transform: uppercase; color: rgba(255,255,255,0.6); margin-bottom: 16px; }
.div-h { font-size: 52px; font-weight: 700; color: white; letter-spacing: -.03em; line-height: 1.1; margin-bottom: 20px; }
.div-desc { font-size: 16px; color: rgba(255,255,255,0.75); line-height: 1.7; max-width: 620px; }
.div-num {
  position: absolute; right: 60px; top: 50%; transform: translateY(-50%);
  font-size: 160px; font-weight: 900; color: rgba(255,255,255,0.1);
  letter-spacing: -.05em; line-height: 1; pointer-events: none;
}

/* ═══════════════════════════════════════════════
   CLICK HINT
═══════════════════════════════════════════════ */
.click-hint {
  position: absolute; bottom: 68px; right: 64px;
  font-size: 11px; color: var(--muted); display: flex;
  align-items: center; gap: 5px; opacity: 0.7;
  animation: pulse 2s ease-in-out infinite;
}
.slide.green .click-hint { color: rgba(255,255,255,0.5); }
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:.9} }

/* Chart.js canvas */
.chart-wrap { position: relative; width: 100%; flex: 1; min-height: 0; }
.chart-wrap canvas { max-height: 100%; }
</style>
</head>
<body>

<div id="kbd-hint">
  <kbd>←</kbd><kbd>→</kbd> navigate &nbsp;·&nbsp; <kbd>Space</kbd> next
</div>

<div id="deck"></div>

<div id="nav">
  <div id="part-tabs">
    <button class="ptab" onclick="goToSection('A')">A</button>
    <button class="ptab" onclick="goToSection('B')">B</button>
    <button class="ptab" onclick="goToSection('C')">C</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>

      <span style="font-size:15px;color:rgba(255,255,255,0.9);line-height:1.65">The graph model shows that Customer is the highest-centrality node, TeamPitch is a sink of all upstream failures, and technology interventions work best as shortcut edges — not new terminal nodes added to an already overloaded system.</span>
    </div>
  </div>
  <div class="title-meta" style="margin-top:32px">Porto 2022 (n=329) · Porto 2025 (n=282) · 1,809 responses · 1,182 problems classified</div>
  <div class="div-num" style="font-size:100px;bottom:40px;top:auto;right:40px;transform:none">EIA</div>
  <div class="click-hint">&#8594; click to reveal each argument</div>
</div>
` },
];

/* ═══════════════════════════════════════════════
   ENGINE
═══════════════════════════════════════════════ */
let current = 0;
let fragIndex = 0;
let chartInstances = {};

const deck = document.getElementById('deck');
const counter = document.getElementById('slide-counter');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const dots = document.getElementById('progress-dots');
const ptabs = document.querySelectorAll('.ptab');

// Build dots
SLIDES.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (s.part !== 0 ? ' section' : '');
  d.title = `Slide ${i+1}`;
  d.onclick = () => goTo(i);
  dots.appendChild(d);
});

function buildSlide(i) {
  const s = SLIDES[i];
  const el = document.createElement('div');
  el.className = `slide ${s.type}`;
  el.dataset.index = i;
  el.innerHTML = s.render();
  // click to advance fragment or next slide
  el.addEventListener('click', () => {
    if (current === i) advanceOrNext();
  });
  return el;
}

// Render all slides
const slideEls = SLIDES.map((_, i) => {
  const el = buildSlide(i);
  deck.appendChild(el);
  return el;
});

function showSlide(idx, direction) {
  const prev = slideEls[current];
  const next = slideEls[idx];

  // Exit current
  prev.classList.remove('active');
  prev.classList.add('exit');
  setTimeout(() => {
    prev.classList.remove('exit');
    prev.style.transform = '';
  }, 350);

  // Enter next — set initial position
  next.style.transform = direction >= 0 ? 'translateX(40px)' : 'translateX(-40px)';
  next.style.opacity = '0';

  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      next.classList.add('active');
      next.style.transform = '';
      next.style.opacity = '';
    });
  });

  current = idx;
  fragIndex = 0;
  updateUI();

  // Render chart if needed
  const s = SLIDES[idx];
  if (s.chartId && !chartInstances[s.chartId]) {
    setTimeout(() => initChart(s.chartId), 100);
  }
}

function advanceOrNext() {
  const s = SLIDES[current];
  const el = slideEls[current];
  const frags = el.querySelectorAll('.frag');

  if (fragIndex < frags.length) {
    frags[fragIndex].classList.add('shown');
    fragIndex++;
  } else {
    navigate(1);
  }
}

function navigate(dir) {
  const target = current + dir;
  if (target < 0 || target >= SLIDES.length) return;

  // reset frags on current
  slideEls[current].querySelectorAll('.frag.shown').forEach(f => {
    if (dir > 0) {} // keep shown if going forward
  });

  showSlide(target, dir);
}

function goTo(idx) {
  if (idx === current) return;
  const dir = idx > current ? 1 : -1;
  showSlide(idx, dir);
}

function goToSection(part) {
  const idx = SLIDES.findIndex(s => s.part === part);
  if (idx !== -1) goTo(idx);
}

function updateUI() {
  counter.textContent = `${current + 1} / ${SLIDES.length}`;
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === SLIDES.length - 1;

  // Dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === current);
  });

  // Part tabs
  const currentPart = SLIDES[current].part;
  ptabs.forEach(t => {
    const tp = t.textContent === 'Intro' ? 0 : t.textContent.replace('Part ', '');
    t.classList.toggle('active', tp === currentPart || (tp === '0' && currentPart === 0));
  });
}

// Init chart
function initChart(id) {
  const canvas = document.getElementById(id);
  if (!canvas || chartInstances[id]) return;
  if (id === 'catChart') {
    chartInstances[id] = new Chart(canvas, {
      type: 'bar',
      data: {
        labels: ['Structure','Mentorship','Keynotes','Team\nFormation','Pacing','Content','Product','Evaluation','Workspace','PeerDyn.','Market\nSizing','Cust.\nValid.','Biz\nModel'],
        datasets: [
          { label: '2025', data: [80,62,55,90,42,28,14,14,9,8,7,5,4], backgroundColor: 'rgba(61,186,78,0.8)', borderRadius: 4, borderSkipped: false },
          { label: '2022 (excl. EpiProdux)', data: [53,72,54,13,35,19,10,2,8,4,7,2,2], backgroundColor: 'rgba(74,127,232,0.65)', borderRadius: 4, borderSkipped: false }
        ]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { backgroundColor: '#1a2a1a', titleColor: '#fff', bodyColor: '#aac8aa', padding: 10, cornerRadius: 6 }
        },
        scales: {
          x: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#5a7060', font: { size: 10, family: 'Space Grotesk' }, maxRotation: 0 } },
          y: { grid: { color: 'rgba(0,0,0,0.04)' }, ticks: { color: '#5a7060', font: { size: 10, family: 'Space Grotesk' } }, title: { display: true, text: 'number of responses', color: '#99b099', font: { size: 10 } } }
        },
        animation: { duration: 900, easing: 'easeOutQuart' }
      }
    });
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); advanceOrNext(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); navigate(-1); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); navigate(-1); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); advanceOrNext(); }
  else if (e.key === 'Home') goTo(0);
  else if (e.key === 'End') goTo(SLIDES.length - 1);
});

// Init
slideEls[0].classList.add('active');
updateUI();
</script>
</body>
</html>
